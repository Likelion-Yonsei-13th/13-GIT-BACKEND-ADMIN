<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if item %}Edit Item{% else %}Create New Item{% endif %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            text-align: center;
            padding: 50px;
        }

        .container {
            width: 40%;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin: auto;
        }

        h1 {
            font-size: 24px;
            color: #333;
        }

        label {
            display: block;
            text-align: left;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{% if item %}글 수정하기{% else %}글 쓰기{% endif %}</h1>
        <form method="POST">
            {% csrf_token %}
            <label for="name">작성자:</label>
            <input type="text" id="name" name="name" value="{{ item.name|default_if_none:'' }}" required>

            <label for="description">본문내용:</label>
            <textarea id="description" name="description" rows="4" required>{{ item.description|default_if_none:'' }}</textarea>

            <button type="submit">{% if item %}수정하기{% else %}Save{% endif %}</button>
        </form>
    </div>
</body>
</html>
